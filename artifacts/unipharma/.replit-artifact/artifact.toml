kind = "web"
previewPath = "/"
title = "PharmLink - منصة التوظيف الصيدلي"
version = "1.0.0"
id = "artifacts/unipharma"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/unipharma run dev"

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.production]
publicDir = "artifacts/unipharma/dist/public"
serve = "static"
build = ["pnpm", "--filter", "@workspace/unipharma", "run", "build"]

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
